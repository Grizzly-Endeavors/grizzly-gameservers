# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # `derivative` is unmaintained — an informational notice, not a
    # vulnerability. It is pulled transitively by poise 0.6.2 (our Discord
    # command framework) with no upstream fix available while we are on poise.
    # Scoped to this one ID: vulnerabilities and every other advisory still
    # fail closed. Revisit and remove when poise drops the dependency.
    "RUSTSEC-2024-0388",
]

[licenses]
# Don't fail when the allow list includes a license no dependency actually uses.
# A fresh scaffold has few deps; the wide allow list is intentional headroom.
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[licenses.private]
# The root crate itself has no license field set. That's fine for unpublished binaries.
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
