# Build → GATE → deploy. On push to main: build the bot/ops-agent image, hand it
# to the centrally-owned gate (which cosign-signs the digest ONLY on a clean
# pass), then pin that signed digest into deploy/values.yaml and commit so Flux
# reconciles it. The deploy job runs only if the gate passed, so an unsigned
# image never reaches the cluster — and the bot-scoped Kyverno policy in
# grizzly-platform (enforce-gameservers-bot-signature) refuses it at admission
# anyway. See grizzly-platform .github/workflows/gate.yaml and the root
# gate-config.json honest map.
name: Build and Deploy
on:
  push:
    branches: [main]

env:
  REGISTRY: registry.registry.svc.cluster.local:5000
  IMAGE_NAME: grizzly-gameservers

jobs:
  build:
    runs-on: lab-runners
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      # The runners' DinD layer store is an emptyDir that dies with the pod, so a plain
      # `docker build` is fully cold every run. BuildKit's registry cache persists layers in
      # zot instead (the same recipe the in-cluster Argo builds use — grizzly-platform
      # ADR-057): dependency layers become LAN-local cache hits and a source-only change
      # rebuilds just the app layers.
      - name: Build and push via BuildKit registry cache (capture digest)
        id: push
        run: |
          set -euo pipefail
          # The buildx builder runs its own buildkitd, which does its own registry I/O and
          # ignores dockerd's --registry-mirror/--insecure-registry flags — so mirror
          # docker.io through zot and mark zot plain-HTTP here, mirroring the
          # buildkitd-config ConfigMap the Argo builds use.
          cat > /tmp/buildkitd.toml <<'EOF'
          [registry."docker.io"]
            mirrors = ["registry.registry.svc.cluster.local:5000"]
          [registry."registry.registry.svc.cluster.local:5000"]
            http = true
          EOF
          # Builder image pinned for reproducibility; bump deliberately (check
          # https://github.com/moby/buildkit/releases). Pulled through dockerd, so the zot
          # Docker Hub mirror serves it LAN-local.
          docker buildx create --name ci \
            --driver docker-container \
            --driver-opt image=moby/buildkit:v0.31.2 \
            --config /tmp/buildkitd.toml
          # oci-mediatypes+image-manifest make zot accept the cache manifest (ADR-057);
          # mode=max caches the intermediate stages too. provenance/sbom are disabled so
          # the push stays a single image manifest — the gate cosign-signs this exact
          # digest and Kyverno verifies it at admission; an attestation index would change
          # what the digest refers to.
          docker buildx build --builder ci -f Dockerfile \
            --cache-from "type=registry,ref=$REGISTRY/$IMAGE_NAME:buildcache" \
            --cache-to "type=registry,ref=$REGISTRY/$IMAGE_NAME:buildcache,mode=max,oci-mediatypes=true,image-manifest=true" \
            --output "type=registry,name=$REGISTRY/$IMAGE_NAME:${GITHUB_SHA}" \
            --provenance=false --sbom=false \
            --metadata-file /tmp/build-metadata.json \
            .
          digest=$(node -pe "require('/tmp/build-metadata.json')['containerimage.digest']")
          # Fail loud on a missing/garbage digest: an empty digest silently poisons the
          # gate (scans `@`) and deploy (pins `@`). Guard the whole pipeline at the source.
          case "$digest" in
            sha256:*) : ;;
            *) echo "::error::empty/invalid image digest from buildx metadata: '${digest}'"; exit 1 ;;
          esac
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

  gate:
    needs: build
    uses: grizzly-endeavors/grizzly-platform/.github/workflows/gate.yaml@master
    with:
      image: registry.registry.svc.cluster.local:5000/grizzly-gameservers@${{ needs.build.outputs.digest }}
      gate_version: v0.7.1 # pinned for reproducibility; bump deliberately

  deploy:
    needs: gate # only runs if the gate passed and signed the image
    runs-on: lab-runners
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          ref: main
      # ADR-020 model: pin deploy/values.yaml to the gate-signed digest and
      # commit [skip ci]; Flux reconciles. [skip ci] keeps this commit from
      # re-triggering the workflow.
      - name: Resolve signed digest, pin, and commit
        run: |
          set -euo pipefail
          # Resolve the digest from the registry by the immutable per-run tag
          # rather than needs.build.outputs.digest: GitHub Actions drops job
          # outputs for this (regular) job on workflow re-runs — the gate job
          # (a reusable workflow) still receives the value, but this job sees ''
          # and would pin a garbage `@`. The ${GITHUB_SHA} tag is exactly what
          # build pushed and what the gate signed; a HEAD on the manifest
          # returns Docker-Content-Digest without pulling any layers, and yields
          # the identical digest whether this is a first run or a re-run.
          DIGEST=$(curl -fsSI \
            -H "Accept: application/vnd.oci.image.manifest.v1+json" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "http://$REGISTRY/v2/$IMAGE_NAME/manifests/${GITHUB_SHA}" \
            | tr -d '\r' | awk 'tolower($1)=="docker-content-digest:" {print $2}')
          export DIGEST
          # Guard: never pin/commit an empty or malformed digest.
          case "$DIGEST" in
            sha256:*) : ;;
            *) echo "::error::could not resolve a sha256 digest for ${GITHUB_SHA}: '${DIGEST}'"; exit 1 ;;
          esac
          # Pipe through yq via stdin/stdout rather than mounting the workspace
          # and writing in place: the yq image runs as uid 1000 and can't write
          # the runner-owned file (permission denied). Here yq only transforms a
          # stream — the shell (as the runner user) owns the redirect, so there's
          # no mount and no uid coupling. set -e leaves values.yaml untouched if
          # yq fails (the temp is discarded before the mv).
          docker run --rm -i -e DIGEST mikefarah/yq:4.53.3@sha256:11a1f0b604b13dbbdc662260d8db6f644b22d8553122a25c1b5b2e8713ca6977 \
            '.image.digest = strenv(DIGEST)' < deploy/values.yaml > deploy/values.yaml.tmp
          mv deploy/values.yaml.tmp deploy/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/values.yaml
          git commit -m "ci: deploy gate-signed bot image [skip ci]" \
            -m "image: ${REGISTRY}/${IMAGE_NAME}@${DIGEST}"
          git push origin HEAD:main
