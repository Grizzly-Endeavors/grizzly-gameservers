# The Discord bot's identity and permissions — also the ops agent's ("Gary")
# identity, since Gary runs inside the bot process rather than as a separate
# workload. The bot provisions per-world instances on command
# (create/kill/start/restart/remove), so it can create and delete GameServers,
# their NodePort Services and their PVCs, and read pod IPs to reach the in-pod
# supervisor control API for /stop, warm /start and /restart. It never patches
# or execs — Gary operates a running server entirely through that supervisor
# HTTP API, not through K8s exec/patch — and is namespace-scoped, never
# cluster-wide.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: discord-bot
  namespace: game-servers
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: discord-bot
  namespace: game-servers
rules:
  # List gameservers and read lifecycle state; create/delete them for
  # create/stop/start/remove. No patch/update — every lifecycle path replaces
  # objects rather than mutating in place.
  - apiGroups: ["agones.dev"]
    resources: ["gameservers"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Resolve NodePorts for addresses, and create/delete the per-instance Service
  # that exposes each world. /stop deliberately retains the Service.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]
  # Per-world persistent storage: created on /create, retained across /stop,
  # deleted only on /remove.
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
  # Resolve a running instance's pod IP to reach its in-pod supervisor control
  # API for /stop, /start (warm) and /restart. Read-only — still no exec/patch.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: discord-bot
  namespace: game-servers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: discord-bot
subjects:
  - kind: ServiceAccount
    name: discord-bot
    namespace: game-servers
