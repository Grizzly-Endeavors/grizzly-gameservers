# The Discord bot's identity and permissions. Strictly read-only and separate
# from the ops-agent (which can patch gameservers and exec into pods) — the bot
# only lists what is running and resolves connection addresses, so it gets
# nothing it does not need. Namespace-scoped, never cluster-wide.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: discord-bot
  namespace: game-servers
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: discord-bot
  namespace: game-servers
rules:
  # List gameservers and read their lifecycle state.
  - apiGroups: ["agones.dev"]
    resources: ["gameservers"]
    verbs: ["get", "list", "watch"]
  # Resolve each gameserver's NodePort to build the friend-facing address.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: discord-bot
  namespace: game-servers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: discord-bot
subjects:
  - kind: ServiceAccount
    name: discord-bot
    namespace: game-servers
