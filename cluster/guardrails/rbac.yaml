# The ops-agent's namespace-scoped permissions — never cluster-wide. The agent
# operates running servers (read config + logs via exec, restart, allocate,
# verify) but is boxed into game-servers. Allocation goes through
# GameServerAllocation CRs on the API server, not the agones-allocator gRPC
# service, so the egress leash (networkpolicy.yaml) needs only API-server reach.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ops-agent
  namespace: game-servers
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ops-agent
  namespace: game-servers
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["agones.dev"]
    resources: ["gameservers", "fleets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["allocation.agones.dev"]
    resources: ["gameserverallocations"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ops-agent
  namespace: game-servers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ops-agent
subjects:
  - kind: ServiceAccount
    name: ops-agent
    namespace: game-servers
