apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agones
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: agones
      version: "1.58.0"
      sourceRef:
        kind: HelmRepository
        name: agones
  targetNamespace: agones-system
  install:
    createNamespace: false
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    agones:
      crds:
        install: true
    gameservers:
      # Scope the SDK ServiceAccount + RBAC the chart provisions to the one
      # namespace game servers run in. This namespace must already exist when
      # the release installs — it ships in cluster/guardrails, rendered by the
      # same ./cluster Flux Kustomization.
      namespaces:
        - game-servers
      # Agones' own dynamic hostPort allocator. We expose servers via NodePort
      # Services (cluster/../games), not hostPort, so nothing should request a
      # Dynamic port — but pin the range clear of the 7000-7010 NodePort band
      # so an accidental Dynamic GameServer can never collide with an edge port.
      minPort: 8000
      maxPort: 8100
