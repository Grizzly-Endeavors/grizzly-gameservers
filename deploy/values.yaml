# Default values for the grizzly-gameservers chart.
# CI bumps the image tag to the gate-signed digest per ADR-020.
image:
  repository: registry.registry.svc.cluster.local:5000/grizzly-gameservers
  # CI (deploy.yml) overwrites `digest` with the gate-signed digest per ADR-020;
  # when set, the chart pins repository@digest (immutable — what cosign signs and
  # Kyverno verifies) and ignores tag/pullPolicy below.
  digest: "sha256:536f5ad491ee41d807dafbdf422a27b1383135a6453b29916e110e5bdefb4498"
  # Dev fallback: a mutable tag pushed by hand (just bot-push). Used only when
  # digest is empty.
  tag: "dev"
  pullPolicy: Always # dev: re-pull the mutable :dev tag on each rollout
# Credentials synced from OpenBao via External Secrets Operator.
# Renders discord-bot + ollama-api Secrets into the release namespace.
externalSecrets:
  enabled: true
  secretStore: openbao # ClusterSecretStore provisioned in grizzly-platform
  refreshInterval: 1h
# Discord bot / ops-agent workload.
bot:
  enabled: true
  replicas: 1
  # guildId (guild-scoped slash registration) and adminUserIds (the mutating-command
  # allowlist) are NOT set here: the repo is public, and although they are not
  # credentials they tie a personal Discord identity to the project. Both are synced
  # from OpenBao (grizzly-platform/gameservers/discord → guild_id, admin_user_ids)
  # and injected via secretKeyRef in templates/deployment.yaml.
  domain: gameservers.grizzly-endeavors.com # base domain for friend-facing connection addresses
  # Optional role-based authorization (a role id is not personally identifying, so it
  # may stay in git). A friend needs this role or to be on the OpenBao user-id allowlist.
  adminRoleId: "" # Discord role id allowed to manage servers
  logLevel: info # RUST_LOG value
  # Ops agent (Gary): the Ollama Cloud model tag. The API key is synced from
  # OpenBao into the ollama-api Secret and injected via secretKeyRef (optional —
  # an absent key disables Gary). Override the model here without a rebuild.
  ollamaModel: glm-5.2
  ollamaBaseUrl: "" # override only for a non-default (e.g. self-hosted) endpoint
  # Per-game catalog path baked into the image; override only if relocated.
  catalogDir: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
