# Default values for the grizzly-gameservers chart.
# CI bumps the image tag to the gate-signed digest per ADR-020.
image:
  repository: registry.registry.svc.cluster.local:5000/grizzly-gameservers
  # CI (deploy.yml) overwrites `digest` with the gate-signed digest per ADR-020;
  # when set, the chart pins repository@digest (immutable — what cosign signs and
  # Kyverno verifies) and ignores tag/pullPolicy below.
  digest: "sha256:7a07e6146e7b39a28a9526dd0891341ab5ea8955eec3a5ed6cee6065c1cf6182"
  # Dev fallback: a mutable tag pushed by hand (just bot-push). Used only when
  # digest is empty.
  tag: "dev"
  pullPolicy: Always # dev: re-pull the mutable :dev tag on each rollout
# Credentials synced from OpenBao via External Secrets Operator.
# Renders discord-bot + ollama-api Secrets into the release namespace.
externalSecrets:
  enabled: true
  secretStore: openbao # ClusterSecretStore provisioned in grizzly-platform
  refreshInterval: 1h
# Discord bot / ops-agent workload.
bot:
  enabled: true
  replicas: 1
  # The operator allowlist (adminUserIds → cross-guild operators) is NOT set here:
  # the repo is public, and although these ids are not credentials they tie a
  # personal Discord identity to the project. It is synced from OpenBao
  # (grizzly-platform/gameservers/discord → admin_user_ids) and injected via
  # secretKeyRef in templates/deployment.yaml. The bot is multi-guild — commands
  # register per-guild on join — so no guild id is pinned. Per-guild admins
  # (roles and users) are configured at runtime with /config, stored in Postgres.
  domain: gameservers.grizzly-endeavors.com # base domain for friend-facing connection addresses
  logLevel: info # RUST_LOG value
  # Ops agent (Gary): the Ollama Cloud model tag. The API key is synced from
  # OpenBao into the ollama-api Secret and injected via secretKeyRef (optional —
  # an absent key disables Gary). Override the model here without a rebuild.
  ollamaModel: glm-5.2
  ollamaBaseUrl: "" # override only for a non-default (e.g. self-hosted) endpoint
  # Foundation Postgres for the bot's durable state (the no-mention home-channel
  # registry). Host/port/name/user are plain config; the password is synced from
  # OpenBao into the grizzly-gameservers-db Secret and injected via secretKeyRef
  # (optional — an absent password disables home channels, mentions still work).
  # Provisioned by grizzly-platform's setup-grizzly-gameservers-stores.yml.
  db:
    host: 10.0.0.200 # foundation Postgres on the R730xd (LAN)
    port: 5432
    name: grizzly_gameservers
    user: grizzly_gameservers
  # S3 (s3-bulk versitygw on the R730xd) for world backups/archives. The access/
  # secret keys come from the grizzly-gameservers-s3 Secret (ESO); absent keys
  # leave the backup feature disabled. Path-style, plain HTTP over the LAN.
  s3:
    endpoint: http://10.0.0.200:7072
    bucket: grizzly-gameservers
    region: us-east-1
  backup:
    intervalHours: 24 # scheduled snapshot cadence for every running server
    retention: 7 # backups kept per server before the cycle prunes older ones
  # Per-game catalog path baked into the image; override only if relocated.
  catalogDir: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
