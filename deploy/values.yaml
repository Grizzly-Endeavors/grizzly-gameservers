# Placeholder values for the grizzly-gameservers chart.
# Real values (image, agones wiring, agent config) land with the chart templates.
# CI bumps the image tag to the gate-signed digest per ADR-020.
image:
  repository: registry.registry.svc.cluster.local:5000/grizzly-gameservers
  tag: "" # set by CI to the signed digest

# Credentials synced from OpenBao via External Secrets Operator.
# Renders discord-bot + ollama-api Secrets into the release namespace.
externalSecrets:
  enabled: true
  secretStore: openbao # ClusterSecretStore provisioned in grizzly-platform
  refreshInterval: 1h

# Discord bot / ops-agent workload.
bot:
  enabled: true
  replicas: 1
  guildId: "" # Discord guild (server) id for guild-scoped slash command registration
  domain: gameservers.bearflinn.com # base domain for friend-facing connection addresses
  # Authorization for the mutating commands (create/stop/start/remove). Set at
  # least one; a friend needs the role or to be on the user-id allowlist.
  adminRoleId: "" # Discord role id allowed to manage servers
  adminUserIds: "" # comma-separated Discord user ids allowed to manage servers
  logLevel: info # RUST_LOG value
  # Per-game catalog path baked into the image; override only if relocated.
  # catalogDir: /usr/local/share/grizzly-gameservers/games
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: "1"
      memory: 256Mi
