{{- if .Values.bot.enabled -}}
# ClusterIP Service fronting the bot's in-game agent endpoint. Game-pod
# supervisors POST player `@Gary` chat triggers here (the reverse loop); the
# bot answers read-only and replies back into the game over RCON. Pod-internal
# only — never a NodePort — and reachable from game pods solely via the
# game-to-bot-agent egress allowance (cluster/guardrails/), since the namespace
# egress leash is otherwise default-deny.
apiVersion: v1
kind: Service
metadata:
  name: grizzly-gameservers-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grizzly-gameservers
    app.kubernetes.io/component: bot
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grizzly-gameservers
    app.kubernetes.io/component: bot
  ports:
    - name: agent
      port: 9360
      targetPort: agent
      protocol: TCP
{{- end -}}
