{{- if .Values.bot.enabled -}}
# The Discord bot + ops-agent workload. Runs as the read-only discord-bot
# ServiceAccount (cluster/guardrails/bot-rbac.yaml) so it can list gameservers
# and resolve their NodePort addresses, nothing more. The bot token is mounted
# from the ESO-synced discord-bot Secret; everything else is plain config.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grizzly-gameservers-bot
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grizzly-gameservers
    app.kubernetes.io/component: bot
spec:
  replicas: {{ .Values.bot.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: grizzly-gameservers
      app.kubernetes.io/component: bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grizzly-gameservers
        app.kubernetes.io/component: bot
    spec:
      serviceAccountName: discord-bot
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-bot
                  key: bot_token
            - name: DISCORD_GUILD_ID
              value: {{ .Values.bot.guildId | quote }}
            - name: GAMESERVERS_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: GAMESERVERS_DOMAIN
              value: {{ .Values.bot.domain | quote }}
            {{- if .Values.bot.adminRoleId }}
            - name: GAMESERVERS_ADMIN_ROLE_ID
              value: {{ .Values.bot.adminRoleId | quote }}
            {{- end }}
            {{- if .Values.bot.adminUserIds }}
            - name: GAMESERVERS_ADMIN_USER_IDS
              value: {{ .Values.bot.adminUserIds | quote }}
            {{- end }}
            - name: RUST_LOG
              value: {{ .Values.bot.logLevel | quote }}
          resources:
            {{- toYaml .Values.bot.resources | nindent 12 }}
          volumeMounts:
            # readOnlyRootFilesystem is on; give the process a writable /tmp.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end -}}
