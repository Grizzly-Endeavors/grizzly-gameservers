{{- if .Values.bot.enabled -}}
# The Discord bot + ops-agent workload. Runs as the discord-bot ServiceAccount
# (cluster/guardrails/bot-rbac.yaml), which can create/delete gameservers,
# their NodePort Services and PVCs, and read pod IPs to reach the in-pod
# supervisor control API — never patch or exec. The bot token is mounted from
# the ESO-synced discord-bot Secret; everything else is plain config.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grizzly-gameservers-bot
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grizzly-gameservers
    app.kubernetes.io/component: bot
spec:
  replicas: {{ .Values.bot.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: grizzly-gameservers
      app.kubernetes.io/component: bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grizzly-gameservers
        app.kubernetes.io/component: bot
    spec:
      serviceAccountName: discord-bot
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bot
          {{- if .Values.image.digest }}
          # Gate-signed, digest-pinned image (CI path). Immutable — what cosign
          # signs and Kyverno verifies at admission. pullPolicy is irrelevant for
          # a digest ref but IfNotPresent avoids a needless re-pull.
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          imagePullPolicy: IfNotPresent
          {{- else }}
          # Dev path: mutable hand-pushed tag (just bot-push). Always re-pull.
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-bot
                  key: bot_token
            - name: GAMESERVERS_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: GAMESERVERS_DOMAIN
              value: {{ .Values.bot.domain | quote }}
            # Cross-guild operator seed: user ids that are admins in every guild.
            # Per-guild admins are configured at runtime via /config (Postgres);
            # there is no per-guild admin *role* env any more.
            - name: GAMESERVERS_ADMIN_USER_IDS
              valueFrom:
                secretKeyRef:
                  name: discord-bot
                  key: admin_user_ids
            # Ops agent (Gary). The key is synced from OpenBao into the ollama-api
            # Secret; marked optional so a missing key leaves Gary disabled (the
            # binary's documented behaviour) rather than crash-looping the pod.
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ollama-api
                  key: api_key
                  optional: true
            - name: OLLAMA_MODEL
              value: {{ .Values.bot.ollamaModel | quote }}
            {{- if .Values.bot.ollamaBaseUrl }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.bot.ollamaBaseUrl | quote }}
            {{- end }}
            {{- if .Values.bot.catalogDir }}
            - name: GAMESERVERS_CATALOG_DIR
              value: {{ .Values.bot.catalogDir | quote }}
            {{- end }}
            # Foundation-Postgres connection for the bot's durable state (the
            # no-mention home-channel registry). Host/port/name/user are plain
            # config; only the password is a secret. It's marked optional so a
            # missing secret leaves persistence disabled (the binary degrades —
            # mentions and slash commands still work) rather than crash-looping.
            - name: DB_HOST
              value: {{ .Values.bot.db.host | quote }}
            - name: DB_PORT
              value: {{ .Values.bot.db.port | quote }}
            - name: DB_NAME
              value: {{ .Values.bot.db.name | quote }}
            - name: DB_USER
              value: {{ .Values.bot.db.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grizzly-gameservers-db
                  key: db_password
                  optional: true
            # S3 (s3-bulk versitygw) for world backups/archives. Endpoint/bucket/
            # region are plain config; only the keys are secret, marked optional so
            # a missing secret leaves the backup feature disabled (graceful) rather
            # than crash-looping — same shape as DB/Ollama above.
            - name: GAMESERVERS_S3_ENDPOINT
              value: {{ .Values.bot.s3.endpoint | quote }}
            - name: GAMESERVERS_S3_BUCKET
              value: {{ .Values.bot.s3.bucket | quote }}
            - name: GAMESERVERS_S3_REGION
              value: {{ .Values.bot.s3.region | quote }}
            - name: GAMESERVERS_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: grizzly-gameservers-s3
                  key: s3_access_key
                  optional: true
            - name: GAMESERVERS_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: grizzly-gameservers-s3
                  key: s3_secret_key
                  optional: true
            - name: GAMESERVERS_BACKUP_INTERVAL_HOURS
              value: {{ .Values.bot.backup.intervalHours | quote }}
            - name: GAMESERVERS_BACKUP_RETENTION
              value: {{ .Values.bot.backup.retention | quote }}
            # In-game agent endpoint: game-pod supervisors POST player `@Gary`
            # chat triggers here (the reverse loop). The token authenticates
            # those POSTs; it's the same grizzly-gameservers-ingame Secret the
            # game pods read (both live in this namespace), and optional so a
            # missing token runs the endpoint open (NetworkPolicy-protected) —
            # same graceful shape as DB/Ollama/S3.
            - name: GAMESERVERS_INGAME_TOKEN
              valueFrom:
                secretKeyRef:
                  name: grizzly-gameservers-ingame
                  key: ingame_token
                  optional: true
            - name: RUST_LOG
              value: {{ .Values.bot.logLevel | quote }}
          ports:
            # The in-game agent endpoint the ClusterIP agent Service targets.
            - name: agent
              containerPort: 9360
              protocol: TCP
          resources:
            {{- toYaml .Values.bot.resources | nindent 12 }}
          volumeMounts:
            # readOnlyRootFilesystem is on; give the process a writable /tmp.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end -}}
