{{- if .Values.bot.enabled -}}
# The Discord bot + ops-agent workload. Runs as the read-only discord-bot
# ServiceAccount (cluster/guardrails/bot-rbac.yaml) so it can list gameservers
# and resolve their NodePort addresses, nothing more. The bot token is mounted
# from the ESO-synced discord-bot Secret; everything else is plain config.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grizzly-gameservers-bot
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grizzly-gameservers
    app.kubernetes.io/component: bot
spec:
  replicas: {{ .Values.bot.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: grizzly-gameservers
      app.kubernetes.io/component: bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grizzly-gameservers
        app.kubernetes.io/component: bot
    spec:
      serviceAccountName: discord-bot
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bot
          {{- if .Values.image.digest }}
          # Gate-signed, digest-pinned image (CI path). Immutable — what cosign
          # signs and Kyverno verifies at admission. pullPolicy is irrelevant for
          # a digest ref but IfNotPresent avoids a needless re-pull.
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          imagePullPolicy: IfNotPresent
          {{- else }}
          # Dev path: mutable hand-pushed tag (just bot-push). Always re-pull.
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-bot
                  key: bot_token
            - name: DISCORD_GUILD_ID
              valueFrom:
                secretKeyRef:
                  name: discord-bot
                  key: guild_id
            - name: GAMESERVERS_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: GAMESERVERS_DOMAIN
              value: {{ .Values.bot.domain | quote }}
            {{- if .Values.bot.adminRoleId }}
            - name: GAMESERVERS_ADMIN_ROLE_ID
              value: {{ .Values.bot.adminRoleId | quote }}
            {{- end }}
            - name: GAMESERVERS_ADMIN_USER_IDS
              valueFrom:
                secretKeyRef:
                  name: discord-bot
                  key: admin_user_ids
            # Ops agent (Gary). The key is synced from OpenBao into the ollama-api
            # Secret; marked optional so a missing key leaves Gary disabled (the
            # binary's documented behaviour) rather than crash-looping the pod.
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ollama-api
                  key: api_key
                  optional: true
            - name: OLLAMA_MODEL
              value: {{ .Values.bot.ollamaModel | quote }}
            {{- if .Values.bot.ollamaBaseUrl }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.bot.ollamaBaseUrl | quote }}
            {{- end }}
            - name: RUST_LOG
              value: {{ .Values.bot.logLevel | quote }}
          resources:
            {{- toYaml .Values.bot.resources | nindent 12 }}
          volumeMounts:
            # readOnlyRootFilesystem is on; give the process a writable /tmp.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end -}}
