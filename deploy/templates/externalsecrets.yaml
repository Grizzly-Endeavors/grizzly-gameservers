{{- if .Values.externalSecrets.enabled -}}
# Pulls the bot/agent credentials from OpenBao into namespace-local K8s Secrets.
# OpenBao paths live under the grizzly-platform/ prefix because the ESO
# ClusterSecretStore is bound to the eso-platform-read policy, which is scoped
# to secret/data/grizzly-platform/* (see grizzly-platform openbao-quickref).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-bot
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: grizzly-gameservers
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecrets.secretStore }}
  target:
    name: discord-bot
    creationPolicy: Owner
  data:
    - secretKey: bot_token
      remoteRef:
        key: grizzly-platform/gameservers/discord
        property: bot_token
    # The operator allowlist lives in OpenBao rather than git: the repo is
    # public, and while these are not credentials they tie a personal Discord
    # identity to the project, so we keep them out of version control. The bot is
    # multi-guild now (commands register per-guild on join), so no guild id is
    # pinned here.
    - secretKey: admin_user_ids
      remoteRef:
        key: grizzly-platform/gameservers/discord
        property: admin_user_ids
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ollama-api
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: grizzly-gameservers
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecrets.secretStore }}
  target:
    name: ollama-api
    creationPolicy: Owner
  data:
    - secretKey: api_key
      remoteRef:
        key: grizzly-platform/gameservers/ollama
        property: api_key
---
# The bot's foundation-Postgres password (durable home-channel state). Lives
# under stores/ (a foundation-store grant), provisioned by grizzly-platform's
# setup-grizzly-gameservers-stores.yml. Only the password is secret; host/port/
# db/user are plain config in the Deployment.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grizzly-gameservers-db
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: grizzly-gameservers
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecrets.secretStore }}
  target:
    name: grizzly-gameservers-db
    creationPolicy: Owner
  data:
    - secretKey: db_password
      remoteRef:
        key: grizzly-platform/stores/grizzly-gameservers
        property: db_password
---
# The shared kv-cache (Valkey) password for Gary's deferred-task queue. The
# instance is a shared foundation store with one `requirepass` password (no ACL
# users), so this is the platform-shared credential under stores/kv-cache — not a
# per-app grant. Only the password is secret; host/port/db are plain config in the
# Deployment. Absent password leaves the deferred-task feature disabled (graceful).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grizzly-gameservers-kv-cache
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: grizzly-gameservers
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecrets.secretStore }}
  target:
    name: grizzly-gameservers-kv-cache
    creationPolicy: Owner
  data:
    - secretKey: redis_password
      remoteRef:
        key: grizzly-platform/stores/kv-cache
        property: password
---
# The bot's s3-bulk versitygw keys for world backups/archives. Also a foundation-
# store grant under stores/, provisioned by setup-grizzly-gameservers-stores.yml
# (--tags s3). Only the keys are secret; endpoint/bucket/region are plain config
# in the Deployment. Absent keys leave the backup feature disabled (graceful).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grizzly-gameservers-s3
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: grizzly-gameservers
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecrets.secretStore }}
  target:
    name: grizzly-gameservers-s3
    creationPolicy: Owner
  data:
    - secretKey: s3_access_key
      remoteRef:
        key: grizzly-platform/stores/grizzly-gameservers
        property: s3_access_key
    - secretKey: s3_secret_key
      remoteRef:
        key: grizzly-platform/stores/grizzly-gameservers
        property: s3_secret_key
---
# Shared bearer token for the in-game agent endpoint (the reverse loop). One
# Secret serves both callers, which share this namespace: the bot reads it to
# verify incoming triggers, and the game pods (games/*/gameserver.yaml) read the
# same key as SUPERVISOR_AGENT_TOKEN to authenticate their POSTs. Until the token
# is provisioned in OpenBao the Secret is empty and both sides degrade to the
# unauthenticated, NetworkPolicy-only posture (see docs/decisions). Generate with
# `openssl rand -hex 32` and store at grizzly-platform/gameservers/ingame → token.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grizzly-gameservers-ingame
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: grizzly-gameservers
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecrets.secretStore }}
  target:
    name: grizzly-gameservers-ingame
    creationPolicy: Owner
  data:
    - secretKey: ingame_token
      remoteRef:
        key: grizzly-platform/gameservers/ingame
        property: token
{{- end -}}
