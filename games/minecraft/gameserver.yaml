# First catalog entry + the bring-up validation server. A single standalone
# GameServer (fixed name so the NodePort Service selector can target it) rather
# than a Fleet — promoting to Fleet + shim-managed per-instance Services is a
# follow-up once the shim exists (docs/design/00-overview.md open decisions).
#
# The image bakes in the grizzly supervisor as its entrypoint (games/minecraft/
# Dockerfile): it launches itzg's server as a child, owns the Agones SDK
# lifecycle (calls /ready once the game accepts connections on 25565, then keeps
# /health pinged — including while the game is paused), and serves an in-pod
# control API on 9359 that the bot drives for in-place stop/start/restart. This
# replaces the old busybox readiness sidecar.
#
# portPolicy: None — Agones does not manage a hostPort; reachability is via the
# NodePort Service in service.yaml (kube-proxy routes to the pod on whatever
# node it lands, so no node-pinning is needed).
apiVersion: agones.dev/v1
kind: GameServer
metadata:
  name: minecraft
  namespace: game-servers
spec:
  # Agones injects its SDK sidecar, so the pod is multi-container; name the one
  # that owns the game port.
  container: minecraft
  ports:
    - name: minecraft
      portPolicy: None
      containerPort: 25565
      protocol: TCP
  health:
    # Minecraft world generation can take a while on first boot; don't let
    # Agones mark the server Unhealthy before the supervisor starts pinging
    # /health (it does so only once the game is accepting connections).
    initialDelaySeconds: 180
    periodSeconds: 15
    failureThreshold: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minecraft
    # Pod hardening (runAsNonRoot / readOnlyRootFilesystem / allowPrivilegeEscalation)
    # is deliberately deferred for the game pod: the composite image runs the
    # supervisor as PID 1 wrapping itzg/minecraft-server, which bootstraps as root
    # (chowns /data, writes outside the world volume) and would break under a
    # read-only root or forced non-root user without live validation. This pod is
    # NOT in the bot deploy path; rootless hardening is tracked alongside game-image
    # CI signing and the Agones carve-out (ADR-003).
    # nosemgrep: yaml.kubernetes.security.run-as-non-root
    spec:
      containers:
        # nosemgrep: yaml.kubernetes.security.allow-privilege-escalation-no-securitycontext
        # nosemgrep: yaml.kubernetes.security.writable-filesystem-container
        - name: minecraft
          # Composite image: grizzly supervisor (PID 1) wrapping itzg's server.
          # CI replaces the tag with the gate-signed digest (ADR-020).
          image: registry.registry.svc.cluster.local:5000/grizzly-gameservers-minecraft:dev
          # Dev-only: the mutable :dev tag means nodes would cache a stale image
          # under the default IfNotPresent. Always re-pull so a fresh push lands.
          # Superseded once CI pins a gate-signed digest (digests are immutable).
          imagePullPolicy: Always
          env:
            - name: EULA
              value: "TRUE"
            - name: MEMORY
              value: "2G"
          ports:
            - name: minecraft
              containerPort: 25565
              protocol: TCP
            # Pod-internal control API the bot reaches over the cluster network.
            # Deliberately not exposed via the NodePort Service.
            - name: control
              containerPort: 9359
              protocol: TCP
          volumeMounts:
            - name: world
              mountPath: /data
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: world
          persistentVolumeClaim:
            claimName: minecraft-data
