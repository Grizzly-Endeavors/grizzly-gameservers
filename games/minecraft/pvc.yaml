# Per-instance Minecraft world state (server.properties, world, mods) under /data.
# The ops agent mutates files here live; it is friend state, not infra, and is
# never committed to git. iscsi-zfs (default, RWO) is network block storage, so it
# reattaches across nodes and the pod can still land anywhere.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minecraft-data
  namespace: game-servers
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: iscsi-zfs
  resources:
    requests:
      storage: 5Gi
