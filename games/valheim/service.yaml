# On-demand NodePort template. The bot renders this per `/create`: it overrides
# metadata.name, points the selector at the instance's GameServer, and replaces
# the nodePort below with a port leased from the 7000-7010 edge-forwarded band
# (the literal value here is only a placeholder). externalTrafficPolicy: Cluster
# is required so a node without the pod still forwards. Valheim's game protocol
# is UDP.
apiVersion: v1
kind: Service
metadata:
  name: valheim
  namespace: game-servers
spec:
  type: NodePort
  externalTrafficPolicy: Cluster
  selector:
    agones.dev/gameserver: valheim
  ports:
    - name: valheim
      port: 2456
      targetPort: 2456
      nodePort: 7004
      protocol: UDP
