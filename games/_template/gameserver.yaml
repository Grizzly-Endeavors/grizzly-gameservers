# Skeleton for a new game. Copy this directory to games/<game>/ and replace the
# REPLACE_* placeholders. The pod defers the *rootless* hardening baseline
# (runAsNonRoot / readOnlyRootFilesystem) by default, matching all 6 current
# games: their upstream bases bootstrap as root (chown the data dir, then drop
# privileges) — see the pod-hardening comment below the labels. A documented
# nosemgrep block keeps the manifest gate-clean. If your game's base genuinely
# runs rootless, restore the full baseline (this directory's README documents it).
#
# The image bakes in the grizzly supervisor as its entrypoint (Dockerfile in
# this directory): it launches the game as a child, owns the Agones SDK
# lifecycle (calls /ready once the game accepts connections, then keeps
# /health pinged — including while the game is paused), and serves an in-pod
# control API on 9359 that the bot drives for in-place stop/start/restart and
# Gary's file/RCON tools. See games/minecraft/ for a filled-in, worked example.
apiVersion: agones.dev/v1
kind: GameServer
metadata:
  name: REPLACE_GAME            # e.g. minecraft, valheim
  namespace: game-servers
spec:
  # Names which container owns the game port (the pod is multi-container:
  # Agones injects its own SDK sidecar alongside this one).
  container: REPLACE_GAME
  ports:
    - name: REPLACE_GAME
      # None: Agones doesn't manage a hostPort; reachability is the NodePort
      # Service (service.yaml). kube-proxy routes to the pod on any node, so no
      # node-pinning — see docs/decisions/002-nodeport-no-node-pin.md.
      portPolicy: None
      containerPort: 0          # REPLACE with the game's listen port
      protocol: TCP             # REPLACE (UDP for many games; see note in README)
  health:
    # Give the server time to boot before Agones starts health-gating it.
    initialDelaySeconds: 180
    periodSeconds: 15
    failureThreshold: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: REPLACE_GAME
    # Pod hardening (runAsNonRoot / readOnlyRootFilesystem / allowPrivilegeEscalation)
    # is deferred by default — that's what all 6 current games do, because the common
    # self-hosted-game bases (itzg, factoriotools, palworld/wolveix, lloesche, ryshe,
    # and similar) bootstrap as root: they chown the mounted data dir to a configurable
    # PUID/PGID, then drop privileges (gosu/su-exec) before launching the game. A forced
    # non-root user or read-only root filesystem breaks that bootstrap. This pod is NOT
    # in the bot deploy path; rootless hardening is tracked alongside game-image CI
    # signing and the Agones carve-out (ADR-003). The three nosemgrep lines below keep
    # the manifest gate-clean while the baseline is deferred.
    #
    # If your game's base genuinely runs rootless (no root chown on startup), it's one
    # of the exceptions: DELETE the three nosemgrep lines and restore the full hardening
    # baseline (documented in this directory's README) — a pod securityContext
    # (runAsNonRoot/runAsUser/runAsGroup/fsGroup/seccompProfile), a container
    # securityContext (allowPrivilegeEscalation: false, readOnlyRootFilesystem: true,
    # capabilities drop [ALL]), and a writable /tmp emptyDir mount.
    # nosemgrep: yaml.kubernetes.security.run-as-non-root
    spec:
      containers:
        # nosemgrep: yaml.kubernetes.security.allow-privilege-escalation-no-securitycontext, yaml.kubernetes.security.writable-filesystem-container
        - name: REPLACE_GAME
          # REPLACE_IMAGE: the composite image from this directory's Dockerfile
          # (grizzly supervisor as PID 1, wrapping the game as its child). CI
          # replaces the tag with the gate-signed digest (ADR-020).
          image: REPLACE_IMAGE          # pin a tag/digest — no floating :latest
          # REPLACE with the game's config env. If this game enables the in-game
          # chat → Gary reverse loop (SUPERVISOR_CHAT_FORMAT in the Dockerfile),
          # also wire these three, matching games/minecraft/gameserver.yaml:
          #   - name: SUPERVISOR_GAMESERVER_NAME
          #     valueFrom:
          #       fieldRef:
          #         fieldPath: metadata.labels['agones.dev/gameserver']
          #   - name: SUPERVISOR_AGENT_URL
          #     value: "http://grizzly-gameservers-agent.game-servers.svc.cluster.local:9360/ingame-trigger"
          #   - name: SUPERVISOR_AGENT_TOKEN
          #     valueFrom:
          #       secretKeyRef:
          #         name: grizzly-gameservers-ingame
          #         key: ingame_token
          #         optional: true
          env: []
          ports:
            - name: REPLACE_GAME
              containerPort: 0          # REPLACE (match spec.ports.containerPort)
              protocol: TCP
            # Pod-internal control API the bot/Gary reach over the cluster
            # network for /stop, /start, /restart and the file/RCON tools.
            # Deliberately not exposed via the NodePort Service.
            - name: control
              containerPort: 9359
              protocol: TCP
          # Container hardening (securityContext) is deferred here too — see the
          # pod-hardening comment above the pod spec for why, and for what to restore
          # if your game's base runs rootless. The nosemgrep on the container line
          # above keeps writable-filesystem / privilege-escalation gate-clean.
          volumeMounts:
            - name: data
              mountPath: /data          # REPLACE with the game's data dir
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              # Whole-CPU limit — fractional limits cause throttling and the gate
              # flags them. Size to the game; omit the limit entirely if bursting
              # is preferable to a hard cap.
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: REPLACE_GAME-data
