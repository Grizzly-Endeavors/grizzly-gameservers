apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Copied with the directory. The new games/<game>/ is wired in by adding it to
# games/kustomization.yaml. _template/ itself is never rendered (it's not listed
# there) — these placeholder manifests won't build until REPLACE_* are filled.
resources:
  - pvc.yaml
  - gameserver.yaml
  - service.yaml
