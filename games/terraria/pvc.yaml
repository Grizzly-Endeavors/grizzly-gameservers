# Per-instance Terraria state (world, config, logs) under /data. The ops agent
# mutates files here live; it is friend state, not infra, and is never committed
# to git. iscsi-zfs (default, RWO) is network block storage, so it reattaches
# across nodes and the pod can still land anywhere. Terraria worlds are small.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: terraria-data
  namespace: game-servers
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: iscsi-zfs
  resources:
    requests:
      storage: 2Gi
